syntax = "proto3";

package sbxswarm.v1;

import "google/api/annotations.proto";

option go_package = "github.com/squall-chua/sbx-swarm-node/internal/gen/sbxswarm/v1;sbxswarmv1";

// NodeService exposes node-level information and control.
service NodeService {
  rpc GetNodeInfo(GetNodeInfoRequest) returns (NodeInfo) {
    option (google.api.http) = {get: "/v1/node"};
  }
  rpc Cordon(CordonRequest) returns (NodeInfo) {
    option (google.api.http) = {post: "/v1/node/cordon"};
  }
  rpc Uncordon(CordonRequest) returns (NodeInfo) {
    option (google.api.http) = {post: "/v1/node/uncordon"};
  }
  rpc Drain(DrainRequest) returns (NodeInfo) {
    option (google.api.http) = {post: "/v1/node/drain"};
  }
  rpc RevokeNode(RevokeNodeRequest) returns (RevokedList) {
    option (google.api.http) = {
      post: "/v1/node/revoke"
      body: "*"
    };
  }
  rpc ListRevoked(ListRevokedRequest) returns (RevokedList) {
    option (google.api.http) = {get: "/v1/node/revoked"};
  }
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse) {
    option (google.api.http) = {get: "/v1/nodes"};
  }
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse) {
    option (google.api.http) = {get: "/v1/templates"};
  }
}

message GetNodeInfoRequest {}

message CordonRequest {
  string node_id = 1; // empty = self
}

message DrainRequest {
  string node_id = 1; // empty = self
}

message RevokeNodeRequest {
  string node_id = 1;
}

message ListRevokedRequest {}

message RevokedList {
  repeated string node_ids = 1;
}

message NodeInfo {
  string node_id = 1;
  string node_name = 2;
  string version = 3;
  bool cordoned = 4;
  bool draining = 5;
}

message ListNodesRequest {}
message ListNodesResponse { repeated NodeSummary nodes = 1; }

message ListTemplatesRequest {}
message ListTemplatesResponse { repeated TemplateInfo templates = 1; }
message TemplateInfo {
  string repository = 1;
  string tag = 2;
  string id = 3;
  string agent = 4;
  string created_at = 5;
}

message NodeSummary {
  string node_id = 1;
  string node_name = 2;
  bool cordoned = 3;
  bool draining = 4;
  map<string, string> labels = 5;
  repeated string capabilities = 6;
  repeated string workspaces = 7;
  repeated string templates = 8;
  double limit_cpu = 9;
  double limit_mem_kb = 10;
  double limit_disk_gb = 11;
  double alloc_cpu = 12;
  double alloc_mem_kb = 13;
  double alloc_disk_gb = 14;
  double actual_cpu = 15;
  double actual_mem = 16;
}
