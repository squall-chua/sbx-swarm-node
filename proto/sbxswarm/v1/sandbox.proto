syntax = "proto3";

package sbxswarm.v1;

import "google/api/annotations.proto";
import "sbxswarm/v1/policy.proto"; // for Empty

option go_package = "github.com/squall-chua/sbx-swarm-node/internal/gen/sbxswarm/v1;sbxswarmv1";

service SandboxService {
  rpc CreateSandbox(CreateSandboxRequest) returns (Operation) {
    option (google.api.http) = {post: "/v1/sandboxes" body: "*"};
  }
  rpc GetSandbox(GetSandboxRequest) returns (Sandbox) {
    option (google.api.http) = {get: "/v1/sandboxes/{id}"};
  }
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse) {
    option (google.api.http) = {get: "/v1/sandboxes"};
  }
  rpc DeleteSandbox(DeleteSandboxRequest) returns (Operation) {
    option (google.api.http) = {delete: "/v1/sandboxes/{id}"};
  }
  rpc StartSandbox(IdRequest) returns (Sandbox) {
    option (google.api.http) = {post: "/v1/sandboxes/{id}/start"};
  }
  rpc StopSandbox(IdRequest) returns (Sandbox) {
    option (google.api.http) = {post: "/v1/sandboxes/{id}/stop"};
  }
  rpc Exec(ExecRequest) returns (ExecResponse) {
    option (google.api.http) = {post: "/v1/sandboxes/{id}/exec" body: "*"};
  }
  rpc WriteFiles(WriteFilesRequest) returns (WriteFilesResponse) {
    option (google.api.http) = {post: "/v1/sandboxes/{id}/files:write" body: "*"};
  }
  rpc AgentRun(AgentRunRequest) returns (Operation) {
    option (google.api.http) = {post: "/v1/sandboxes/{id}/agent-run" body: "*"};
  }
  rpc PublishPort(PublishPortRequest) returns (Port) {
    option (google.api.http) = {post: "/v1/sandboxes/{id}/ports" body: "*"};
  }
  rpc ListPorts(IdRequest) returns (ListPortsResponse) {
    option (google.api.http) = {get: "/v1/sandboxes/{id}/ports"};
  }
  rpc UnpublishPort(UnpublishPortRequest) returns (Empty) {
    option (google.api.http) = {delete: "/v1/sandboxes/{id}/ports/{container_port}"};
  }
  rpc GetStats(IdRequest) returns (Stats) {
    option (google.api.http) = {get: "/v1/sandboxes/{id}/stats"};
  }
  rpc ListBlocked(IdRequest) returns (ListBlockedResponse) {
    option (google.api.http) = {get: "/v1/sandboxes/{id}/network/blocked"};
  }
  rpc PublishSandbox(PublishSandboxRequest) returns (Operation) {
    option (google.api.http) = {post: "/v1/sandboxes/{id}/git/publish" body: "*"};
  }
  rpc PublishWork(PublishWorkRequest) returns (PublishResult) {
    option (google.api.http) = {post: "/v1/sandboxes/{id}/git/publish-work" body: "*"};
  }
  rpc ListBranches(IdRequest) returns (ListBranchesResponse) {
    option (google.api.http) = {get: "/v1/sandboxes/{id}/git/branches"};
  }
  rpc KeepAlive(IdRequest) returns (Sandbox) {
    option (google.api.http) = {post: "/v1/sandboxes/{id}/keepalive"};
  }
  rpc ListOperations(ListOperationsRequest) returns (ListOperationsResponse) {
    option (google.api.http) = {get: "/v1/operations"};
  }
}

message WorkspaceMount {
  string name = 1;
  bool read_only = 2;
}

message CreateSandboxRequest {
  string agent = 1;
  string template = 2;
  int32 cpus = 3;
  int64 memory_bytes = 4;
  bool clone = 5;
  repeated WorkspaceMount workspaces = 6;
  map<string, string> env = 7;
  map<string, string> labels = 8;
  double disk_gb = 9;
  string strategy = 10; // optional: least-loaded|bin-pack|spread|least-actual-load (empty = node default)
  map<string, string> node_affinity = 11;       // match node labels (zone/rack/gpu), not the sandbox's own labels
  map<string, string> node_anti_affinity = 12;  // exclude nodes whose labels match (node labels, not the sandbox's own)
  string branch = 13; // clone-mode: branch the agent works on / auto-publish target
  string name = 14;   // optional human-readable display name (blank => auto-derived)
}

message Sandbox {
  string id = 1;
  string owner_node = 2;
  string status = 3;
  repeated Port ports = 4;
  map<string, string> labels = 5;
  string branch = 6;       // clone-mode recorded branch
  string last_publish = 7; // RFC3339; empty if never published
  string agent = 8;        // the agent the sandbox runs (from its create spec)
  string name = 9;         // human-readable display name (custom or auto-derived); NOT the routing id
  repeated WorkspaceMount workspaces = 10; // workspaces mounted into the sandbox
  string created_at = 11;  // RFC3339 sandbox creation (provision) time
  int32 cpus = 12;         // provisioned vCPUs (from create spec)
  int64 memory_bytes = 13; // provisioned memory (bytes)
  double disk_gb = 14;     // provisioned/requested disk (GB)
}

message GetSandboxRequest { string id = 1; }
message IdRequest { string id = 1; }
message DeleteSandboxRequest { string id = 1; }

message ListBranchesResponse { repeated string branches = 1; }
message PublishSandboxRequest {
  string id = 1;
  string branch = 2; // optional: overrides the recorded branch (single)
  repeated string branches = 3; // optional: publish these specific branches (multi-select)
}

message PublishWorkRequest {
  string id = 1;       // sandbox id; source branch is the sandbox's own HEAD/recorded branch
  string strategy = 2; // branch|patch|pull_request|merge_request|gerrit_change
  string target = 3;   // branch: push dest; PR/MR: base branch; gerrit: refs/for/<target>
  string title = 4;    // PR/MR title
  string body = 5;     // PR/MR body
}

message PublishResult {
  string ref = 1;          // pushed ref (refs/heads/... or refs/for/...)
  string delivery_url = 2; // PR/MR/Change URL; empty for a plain branch push
  string change_id = 3;    // gerrit only
  bytes  patch = 4;        // patch strategy only
}

message ListSandboxesRequest {
  string status = 1;
  string label = 2;
}
message ListSandboxesResponse { repeated Sandbox sandboxes = 1; }

message ExecRequest {
  string id = 1;
  repeated string cmd = 2;
  string workdir = 3;
  map<string, string> env = 4;
}
message ExecResponse {
  int32 exit_code = 1;
  bytes stdout = 2;
  bytes stderr = 3;
}

message WriteFilesRequest {
  string id = 1;
  repeated FileWrite files = 2;
}
message FileWrite {
  string path = 1;    // absolute, or relative to the default upload dir (/home/agent); no ".."
  bytes content = 2;
  uint32 mode = 3;    // optional unix mode (e.g. 0644); 0 => leave default
}
message WriteFilesResponse { int32 files_written = 1; }

message AgentRunRequest {
  string id = 1;
  repeated string cmd = 2;
  string workdir = 3;
  map<string, string> env = 4;
  bool publish_on_success = 5;
}

message PublishPortRequest {
  string id = 1;
  int32 container_port = 2;
}
message UnpublishPortRequest {
  string id = 1;
  int32 container_port = 2;
}
message Port {
  int32 container_port = 1;
  int32 host_port = 2;
}
message ListPortsResponse { repeated Port ports = 1; }

message Operation {
  string id = 1;
  string type = 2;
  string state = 3;
  string sandbox_id = 4;
  string error = 5;
}

message Stats {
  int32 cores = 1;
  double cpu_percent = 2;
  int64 mem_total_kb = 3;
  int64 mem_used_kb = 4;
}

message Blocked {
  string host = 1;
  string first_seen = 2;
  string last_seen = 3;
  int32 count = 4; // proxy hit count
}

message ListBlockedResponse {
  repeated Blocked blocked = 1;
  int32 distinct_count = 2;
  repeated Blocked allowed = 3;        // allowed egress (host, first/last seen)
  int32 allowed_distinct_count = 4;
}

message OperationSummary {
  string id = 1;
  string type = 2;
  string state = 3;
  string sandbox_id = 4;
  string error = 5;
  string created_at = 6; // RFC3339
  string updated_at = 7; // RFC3339
}
message ListOperationsRequest { int32 limit = 1; } // 0 = server default (200)
message ListOperationsResponse { repeated OperationSummary operations = 1; }
