syntax = "proto3";

package sbxswarm.v1;

import "google/api/annotations.proto";

option go_package = "github.com/squall-chua/sbx-swarm-node/internal/gen/sbxswarm/v1;sbxswarmv1";

service PolicyService {
  rpc ListPolicy(ScopeRequest) returns (ListPolicyResponse) {
    option (google.api.http) = {get: "/v1/sandboxes/{scope}/policy"};
  }
  rpc SetPolicy(SetPolicyRequest) returns (Empty) {
    option (google.api.http) = {put: "/v1/sandboxes/{scope}/policy" body: "*"};
  }
  rpc DeletePolicyRule(DeletePolicyRuleRequest) returns (Empty) {
    option (google.api.http) = {delete: "/v1/sandboxes/{scope}/policy/{resource}"};
  }
  rpc ListSecrets(ScopeRequest) returns (ListSecretsResponse) {
    option (google.api.http) = {get: "/v1/sandboxes/{scope}/secrets"};
  }
  rpc SetSecret(SetSecretRequest) returns (Empty) {
    option (google.api.http) = {put: "/v1/sandboxes/{scope}/secrets" body: "*"};
  }
  rpc DeleteSecret(DeleteSecretRequest) returns (Empty) {
    option (google.api.http) = {delete: "/v1/sandboxes/{scope}/secrets/{host}"};
  }
  rpc DeleteStoredSecret(DeleteStoredSecretRequest) returns (Empty) {
    option (google.api.http) = {delete: "/v1/sandboxes/{scope}/stored-secrets/{name}"};
  }
}

// Empty is a placeholder response for mutating RPCs.
message Empty {}

// ScopeRequest targets a scope: "" = node-global, sandbox id = per-sandbox.
message ScopeRequest {
  string scope = 1;
}

// PolicyRuleMsg carries one policy rule. Never carries a secret value.
message PolicyRuleMsg {
  string provenance = 1;
  string applies_to = 2;
  string rule = 3;
  string type = 4;
  string decision = 5;
  string resources = 6;
}

// ListPolicyResponse is the response for ListPolicy.
message ListPolicyResponse {
  repeated PolicyRuleMsg rules = 1;
}

// SetPolicyRequest adds an allow or deny rule for a host within a scope.
message SetPolicyRequest {
  string scope = 1;
  string decision = 2; // "allow" | "deny"
  string host = 3;
}

// DeletePolicyRuleRequest removes a network policy rule by resource (host[:port]).
message DeletePolicyRuleRequest {
  string scope = 1;
  string resource = 2;
}

// SecretMsg describes a custom secret entry. The secret value is NEVER included
// (write-only, spec §11). placeholder is the non-secret injection token the proxy
// swaps for the real value — safe to surface (it is visible inside every sandbox).
message SecretMsg {
  string host = 1;
  string env = 2;
  string placeholder = 3;
}

// StoredSecretMsg describes a stored (service/registry) secret. No value, ever.
message StoredSecretMsg {
  string name = 1;
  string type = 2; // "service" | "registry"
  string scope = 3; // "" = node-global, else the owning sandbox id
}

// ListSecretsResponse is the response for ListSecrets. No value fields, ever.
message ListSecretsResponse {
  repeated SecretMsg custom = 1;
  repeated StoredSecretMsg stored = 2;
}

// SetSecretRequest sets a custom secret. value is write-only: not stored, not
// returned, not logged.
message SetSecretRequest {
  string scope = 1;
  string host = 2;
  string env = 3;
  string value = 4;
}

// DeleteSecretRequest removes a custom secret by host.
message DeleteSecretRequest {
  string scope = 1;
  string host = 2;
}

// DeleteStoredSecretRequest removes a stored (service/registry) secret by name.
message DeleteStoredSecretRequest {
  string scope = 1;
  string name = 2;
}
